# Netlify deploy config for a Next.js static export.
# Connect this repo in Netlify and it picks these up automatically.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "24"

# ---- Caching ----
# Immutable hashed build assets — cache forever.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Media (filenames are stable) — cache a week, revalidate in background.
[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/reels/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# ---- Security headers (world-class baseline) ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    X-DNS-Prefetch-Control = "on"
    # Everything is self-hosted (fonts via next/font, all media in /public),
    # so a same-origin CSP is safe. 'unsafe-inline' is required for Next's
    # hydration scripts, the JSON-LD block, and framer-motion inline styles.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; media-src 'self'; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"
